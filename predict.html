<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prediction Result - Deep Learning Classification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px;
            box-shadow:
                0 50px 100px -20px rgba(0, 0, 0, 0.3),
                0 30px 60px -30px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        /* Decorative Elements */
        .result-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .header-section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a1c20 0%, #4a4e5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .model-badge i {
            font-size: 1.2rem;
        }

        /* Image Container */
        .image-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto 32px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow:
                0 30px 60px -15px rgba(0, 0, 0, 0.3),
                0 0 0 2px rgba(255, 255, 255, 0.1) inset;
            transform: translateY(0);
            transition: all 0.3s ease;
            z-index: 1;
        }

        .image-container:hover {
            transform: translateY(-5px);
            box-shadow:
                0 40px 80px -20px rgba(0, 0, 0, 0.4),
                0 0 0 3px rgba(255, 255, 255, 0.2) inset;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-container:hover img {
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
        }

        .image-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a4e5a;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 2;
        }

        /* Prediction Result */
        .prediction-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .prediction-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b8e9b;
            margin-bottom: 8px;
        }

        .prediction-value {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #059669, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding: 0 20px;
            position: relative;
        }

        .prediction-value::before,
        .prediction-value::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
        }

        .prediction-value::before {
            left: -30px;
        }

        .prediction-value::after {
            right: -30px;
        }

        /* Confidence Score (if available) */
        .confidence-score {
            display: inline-block;
            background: #f0f9ff;
            padding: 12px 28px;
            border-radius: 40px;
            margin-top: 16px;
            border: 1px solid #bae6fd;
        }

        .confidence-score span {
            color: #0369a1;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 14px 32px;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e0e3e9;
            color: #4a4e5a;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .btn i {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn:hover i {
            transform: translateX(3px);
        }

        /* Success Animation */
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
            z-index: 1;
        }

        .check-icon {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            box-sizing: content-box;
            border: 4px solid #10b981;
        }

        .check-icon::before {
            top: 50%;
            left: 50%;
            height: 50%;
            width: 4px;
            background-color: #10b981;
            transform: translateX(-50%) translateY(-50%) rotate(-45deg);
            transform-origin: left top;
            animation: animateCheckmark 0.3s ease 0.4s forwards;
        }

        .check-icon::after {
            top: 50%;
            left: 50%;
            height: 50%;
            width: 4px;
            background-color: #10b981;
            transform: translateX(-50%) translateY(-50%) rotate(-135deg);
            transform-origin: left top;
            animation: animateCheckmark 0.3s ease 0.6s forwards;
        }

        @keyframes animateCheckmark {
            0% {
                height: 0;
            }

            100% {
                height: 50%;
            }
        }

        /* File Info */
        .file-info {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 20px;
            margin: 24px auto 0;
            max-width: 300px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #eef2f6;
        }

        .file-info i {
            color: #667eea;
            font-size: 1.2rem;
        }

        .file-info span {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .result-card {
                padding: 32px 24px;
            }

            .header-section h2 {
                font-size: 1.8rem;
            }

            .prediction-value {
                font-size: 2.2rem;
            }

            .prediction-value::before,
            .prediction-value::after {
                width: 15px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1c20 0%, #2d3748 100%);
            }
        }

        /* Loading state for future use */
        .loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="result-card">

            <!-- Success Animation -->
            <div class="success-checkmark">
                <div class="check-icon"></div>
            </div>

            <!-- Header Section -->
            <div class="header-section">
                <h2 class="fw-bold">
                    <i class="bi bi-check-circle-fill me-2" style="color: #10b981;"></i>
                    Prediction Complete
                </h2>
                <div class="model-badge">
                    <i class="bi bi-cpu"></i>
                    {{ model }}
                </div>
            </div>

            <!-- Image Display -->
            <div class="image-container">
                <img src="/{{ image }}" alt="Uploaded Image" class="img-fluid">
                <div class="image-overlay"></div>
                <div class="image-badge">
                    <i class="bi bi-image me-1"></i>
                    Uploaded Image
                </div>
            </div>

            <!-- File Information -->
            <div class="file-info">
                <i class="bi bi-file-earmark-image"></i>
                <span>{{ image.split('/')[-1] }}</span>
            </div>

            <!-- Prediction Result -->
            <div class="prediction-section">
                <div class="prediction-label">CLASSIFICATION RESULT</div>
                <div class="prediction-value">{{ prediction }}</div>

                <!-- Confidence Score - You can add this if your model returns confidence -->
                <!--
                <div class="confidence-score">
                    <i class="bi bi-bar-chart-fill me-2"></i>
                    <span>Confidence: 98.5%</span>
                </div>
                -->
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-house-door"></i>
                    Back to Dashboard
                </a>
                <a href="javascript:history.back()" class="btn btn-outline">
                    <i class="bi bi-arrow-left"></i>
                    New Prediction
                </a>
            </div>

            <!-- Additional Info -->
            <div class="text-center mt-4">
                <small class="text-muted">
                    <i class="bi bi-shield-check me-1"></i>
                    Powered by Deep Learning · Real-time Classification
                </small>
            </div>
        </div>
    </div>

    <!-- Add Bootstrap JS for any interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
